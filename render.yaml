# Render Blueprint — https://render.com/docs/blueprint-spec
# Monorepo : `rootDir` + chemins relatifs à chaque app
# (https://render.com/docs/monorepo-support#setting-a-root-directory).
# Site statique : pas de clé `region` (CDN global ; le backend reste en frankfurt).
#
# Puis : sur p2p-console, variable VITE_P2P_NODE_URLS = URL HTTPS du backend
# (sans slash final), puis redeploy statique « Clear build cache ».

services:
  - type: web
    name: p2p-backend
    runtime: docker
    region: frankfurt
    plan: free
    numInstances: 1
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    maxShutdownDelaySeconds: 60
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: NODE_ID
        value: node-render-1

  - type: web
    name: p2p-console
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "22.14.0"
      - key: VITE_TARGET_REPLICAS
        value: "3"
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
