# Render Blueprint — https://render.com/docs/infrastructure-as-code
#
# Deploy: Dashboard → New → Blueprint → point at this file.
#
# Après le premier déploiement du backend, renseignez VITE_P2P_NODE_URLS
# (URL HTTPS du service p2p-backend, sans slash final) puis redeployez le
# site statique — les variables VITE_* sont figées au build.
#
# Multi-nœuds: dupliquez le service Docker et NODE_PEERS_0, NODE_PEERS_1, …

services:
  - type: web
    name: p2p-backend
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: NODE_ID
        value: node-render-1

  # Les sites statiques sont des services web avec runtime: static (pas staticSites).
  - type: web
    name: p2p-console
    runtime: static
    region: frankfurt
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_P2P_NODE_URLS
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
