# Render Blueprint — https://render.com/docs/blueprint-spec
#
# New » Blueprint » sélectionner ce dépôt (render.yaml à la racine).
#
# Après le premier déploiement du backend, ajoutez sur p2p-console la variable
# VITE_P2P_NODE_URLS (URL HTTPS du backend, sans slash final), puis redeploy du
# statique avec « Clear build cache » — les VITE_* sont figées au build npm.

services:
  - type: web
    name: p2p-backend
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: NODE_ID
        value: node-render-1

  # Ancienne clé `staticSites` n’est plus dans la spec : même bloc sous services,
  # runtime `static`, champ obligatoire `staticPublishPath` (relatif à la racine git).
  - type: web
    name: p2p-console
    runtime: static
    region: frankfurt
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: NODE_VERSION
        value: "22.14.0"
      - key: VITE_TARGET_REPLICAS
        value: "3"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
